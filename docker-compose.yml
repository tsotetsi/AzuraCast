secrets:
  MARIADB_ROOT_PASSWORD:
    file: .secrets/mariadb/mariadb_root_password.txt
  MARIADB_PASSWORD:
    file: .secrets/mariadb/mariadb_password.txt

services:
  web:
    image: ghcr.io/azuracast/azuracast:development
    build:
      context: .
      target: development
    entrypoint: /var/azuracast/www/util/docker/web/entrypoint.sh
    command: 'tini -- /usr/local/bin/my_init --no-main-command'
    environment:
      ENABLE_REDIS: "true"
      LIQUIDSOAP_HOST: web
      REDIS_HOST: keydb
      MYSQL_HOST: mariadb
      MYSQL_USER: ${MARIADB_USER:-azuracast}
      MYSQL_PASSWORD_FILE: /run/secrets/MARIADB_PASSWORD
      # Set the DB_* variables the application code expects.
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${MARIADB_USER:-azuracast}
      DB_DATABASE: ${MARIADB_DATABASE:-azuracast}
      CENTRIFUGO_URL: http://centrifugo:6025/api
    volumes:
      - azuracast_stations:/var/azuracast/stations
      - azuracast_backups:/var/azuracast/backups
      - azuracast_storage:/var/azuracast/storage
      - ./node_modules:/var/azuracast/www/node_modules
      - ./vendor:/var/azuracast/www/vendor
      - ./:/var/azuracast/www
      - php-fpm-socket:/var/run
    ports:
      - "80:80"
      - "443:443"
      #- "127.0.0.1:6025:6025" # Centrifugo
    cap_add:
      - SYS_PTRACE
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - azuracast_network
    depends_on:
      mariadb:
        condition: service_healthy
      keydb:
        condition: service_healthy
    secrets:
      - MARIADB_PASSWORD

  stations:
    build:
      context: .
      dockerfile: util/docker/stations/Dockerfile.stations
    volumes:
      - azuracast_stations:/var/azuracast/stations
      - azuracast_backups:/var/azuracast/backups
      - azuracast_storage:/var/azuracast/storage
    networks:
      - azuracast_network
    depends_on:
      mariadb:
        condition: service_healthy
      keydb:
        condition: service_healthy
    restart: unless-stopped

  sftpgo:
    image: drakkan/sftpgo:v2.6.4
    container_name: azuracast_sftpgo
    ports:
      - "2022:2022" # SFTP
    environment:
      # Ensure permissions match your 'azuracast' user (usually 1000)
      - SFTPGO_PUID=1000
      - SFTPGO_PGID=1000
      # Override the localhost hooks to point to the 'web' container
      - SFTPGO_COMMON__ACTIONS__HOOK=http://web:6010/api/internal/sftp-event
      - SFTPGO_DATA_PROVIDER__EXTERNAL_AUTH_HOOK=http://web:6010/api/internal/sftp-auth

      - SFTPGO_SFTPD__BINDINGS__0__PORT=${AZURACAST_SFTP_PORT:-2022}
      # Tell the binary where the keys are INSIDE the container
      - SFTPGO_SFTPD__HOST_KEYS=/var/azuracast/storage/sftpgo/id_rsa,/var/azuracast/storage/sftpgo/id_ecdsa,/var/azuracast/storage/sftpgo/id_ed25519
      - SFTPGO_DATA_PROVIDER__USERS_BASE_DIR=/var/azuracast/stations
    volumes:
      # The Main Config
      - ./util/docker/web/sftpgo/sftpgo.json:/var/sftpgo/sftpgo.json:ro

      # The Keys & Persistence: Absolute paths to match your existing scripts
      - /var/azuracast/storage/sftpgo:/var/azuracast/storage/sftpgo

      # The Media Bridge: Shared with the Web/App container
      - /var/azuracast/stations:/var/azuracast/stations
      
      # Temp space for uploads
      - sftpgo_temp:/tmp/sftpgo_temp
    networks:
      - azuracast_network
    restart: unless-stopped

  centrifugo:
    image: centrifugo/centrifugo:v5 # Use the version matching setup
    container_name: azuracast_centrifugo
    restart: unless-stopped
    ports:
      - "6020:6020"
      - "6025:6025"
    environment:
      # Map the Redis engine logic from template
      - CENTRIFUGO_ENGINE=redis
      - CENTRIFUGO_REDIS_ADDRESS=keydb:6379
      - CENTRIFUGO_REDIS_DB=${REDIS_DB:-0}
      - CENTRIFUGO_REDIS_PREFIX=centrifugo:c
      # Match the ports from TOML
      - CENTRIFUGO_PORT=6020
      - CENTRIFUGO_INTERNAL_PORT=6025
    volumes:
      # Mount existing config as the base
      - ./util/docker/web/centrifugo/config.toml.tmpl:/etc/centrifugo/config.toml:ro
    networks:
      - azuracast_network
    command: centrifugo -c /etc/centrifugo/config.toml

  keydb:
    image: azuracast-keydb:latest
    build:
      context: ./util/docker/keydb
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - keydb_data:/data
    networks:
      - azuracast_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb:
    image: azuracast-mariadb:latest
    build:
      context: ./util/docker/mariadb/
    restart: unless-stopped
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/MARIADB_ROOT_PASSWORD
      MARIADB_DATABASE: ${MARIADB_DATABASE:-azuracast}
      MARIADB_USER: ${MARIADB_USER:-azuracast}
      MARIADB_PASSWORD_FILE: /run/secrets/MARIADB_PASSWORD
    secrets:
      - MARIADB_ROOT_PASSWORD
      - MARIADB_PASSWORD
    ports:
      - 3306:3306
    networks:
      - azuracast_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sftpgo_data:
  sftpgo_temp:
  station_data:
  keydb_data:
  mariadb_data:
  azuracast_stations:
  azuracast_backups:
  azuracast_storage:
  php-fpm-socket:

networks:
  azuracast_network: