secrets:
  MARIADB_PASSWORD:
    file: .secrets/mariadb/mariadb_password.txt
  MARIADB_ROOT_PASSWORD:
    file: .secrets/mariadb/mariadb_root_password.txt

services:
  web:
    # image: ghcr.io/azuracast/azuracast:development
    # build:
    #   context: .
    #   target: development
    # entrypoint: /var/azuracast/www/util/docker/web/entrypoint.sh
    # command: 'tini -- /usr/local/bin/my_init --no-main-command'
    # environment:
    #   # Set the DB_* variables the application code expects.
    #   DB_HOST: mariadb
    #   DB_PORT: 3306
    #   DB_USER: ${MARIADB_USER:-azuracast}
    #   DB_DATABASE: ${MARIADB_DATABASE:-azuracast}
    #   MYSQL_PASSWORD_FILE: /run/secrets/MARIADB_PASSWORD
    #   LIQUIDSOAP_HOST: stations
    # secrets:
    #   - MARIADB_PASSWORD
    ports:
    #  - "80:80"
    #  - "443:443"
    #  - "127.0.0.1:3306:3306" # MariaDB
      #- "127.0.0.1:6025:6025" # Centrifugo
      - "9104:9104" # MariaDB Exporter
      - "9113:9113" # Nginx Exporter
      - "9121:9121" # Redis Exporter
      #- "9000:9000" # PHP-FPM for exporter
    cap_add:
      - SYS_PTRACE
    # environment:
      # VAR_DUMPER_FORMAT: server
      # VAR_DUMPER_SERVER: host.docker.internal:9912
    volumes:
      # Uncomment these lines if mounting a custom SSL cert (i.e. mkcert)
      # - $PWD/util/local_ssl/default.crt:/var/azuracast/storage/acme/custom.crt:ro
      # - $PWD/util/local_ssl/default.key:/var/azuracast/storage/acme/custom.key:ro
      - $PWD/node_modules:/var/azuracast/www/node_modules
      - $PWD/vendor:/var/azuracast/www/vendor
      - $PWD:/var/azuracast/www
      - php-fpm-socket:/var/run
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - azuracast_network
  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - azuracast_network
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
  
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks:
      - azuracast_network
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager
      - alertmanager_data:/alertmanager

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      - azuracast_network
    restart: unless-stopped
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki:/etc/loki:ro
    user: "10001:10001"
    networks:
      - azuracast_network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./monitoring/promtail:/etc/promtail:ro
      - /var/log:/var/log/host:ro              # Mount HOST logs
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For Docker discovery
      - promtail_data:/var/log/promtail         # Persistent positions
    user: "0:0"
    command: >
      -config.file=/etc/promtail/promtail-config.yaml
      -config.expand-env=true  # REQUIRED for ${HOSTNAME}
    environment:
      - HOSTNAME=azuracast.local   # Pass host machine name.
    networks:
      - azuracast_network
    restart: unless-stopped
    # Critical permission fix for log access:
    security_opt:
      - label:disable
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid
  
  # MariaDB Exporter
  mariadb-exporter:
    image: prom/mysqld-exporter
    container_name: mariadb-exporter
    entrypoint:
      - /bin/sh
      - -c
      - |
        export DATA_SOURCE_NAME="root:$$(cat /run/secrets/MARIADB_ROOT_PASSWORD)@tcp(mariadb:3306)/"
        exec /bin/mysqld_exporter
    secrets:
      - MARIADB_ROOT_PASSWORD
    networks:
      - azuracast_network
    restart: unless-stopped
  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter
    container_name: redis-exporter
    environment:
      - REDIS_ADDR=keydb:6379
    networks:
      - azuracast_network
    restart: unless-stopped

  # Nginx Exporter (Requires stub_status, see below)
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter
    container_name: nginx-exporter
    command:
      - --nginx.scrape-uri=http://web/nginx_status
      - --log.level=debug
    networks:
      - azuracast_network
    restart: unless-stopped
  
  # PHP-FPM Exporter
  php-fpm-exporter:
    image: hipages/php-fpm_exporter
    container_name: php-fpm-exporter
    ports:
      - "9253:9253"
    user: "0:33" # Run as root user, but in www-data group
    environment:
      - PHP_FPM_SCRAPE_URI=unix:///var/run/php-fpm-www.sock;/status
    networks:
      - azuracast_network
    restart: unless-stopped
    depends_on:
      - web
    volumes:
      - php-fpm-socket:/var/run

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - azuracast_network
    restart: unless-stopped

networks:
  azuracast_network:
    name: azuracast_network

volumes:
  prometheus_data: {}
  grafana_data: {}
  promtail_data: {}
  alertmanager_data: {}
  php-fpm-socket: {}
  cadvisor_data: {}